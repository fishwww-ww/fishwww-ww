name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: fishwww-ww
          template: classic
          # 在 base 中加入 metadata，并在 config_order 中合理安排新模块的位置
          base: header, activity, community, repositories, metadata
          config_display: large
          # 将新增的 achievements, followup, stars 模块加入到排序中
          config_order: base.header, isocalendar, languages, achievements, followup, stars
          config_timezone: Asia/Shanghai
          
          # ==================== 你原本的注释代码（保持不动） ====================
          # plugin_habits: yes
          # plugin_habits_days: 14
          # plugin_habits_facts: no
          # plugin_habits_charts: yes
          # plugin_habits_from: 100
          # plugin_topics: yes
          # plugin_topics_limit: 0
          # plugin_topics_mode: icons
          # ==================================================================

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          plugin_languages: yes
          plugin_languages_ignored: jupyter notebook, html, css 
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_recent_load: 200                      
          plugin_languages_recent_days: 14

          # ==================== 你原本的注释代码（保持不动） ====================
          # plugin_lines: yes
          # plugin_wakatime: yes
          # plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          # plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          # ==================================================================

          repositories_affiliations: owner,collaborator

          # ==================== ✨ 以下为新为你添加的推荐模块 ====================
          
          # 1. 社区成就勋章（让主页看起来像打游戏解锁成就一样炫酷）
          plugin_achievements: yes
          plugin_achievements_secrets: yes # 展示隐藏成就
          plugin_achievements_display: compact # 紧凑型排列，节省空间
          plugin_achievements_limit: 5 # 最多展示 5 个核心成就

          # 2. 开源参与度追踪（展示你作为 Contributor 的 Issue 和 PR 进展）
          plugin_followup: yes
          plugin_followup_sections: newsletters, user # 展示你关注的动态和你自己的进展

          # 3. 最近 Star 过的硬核项目（展示你的技术审美和关注圈）
          plugin_stars: yes
          plugin_stars_limit: 4 # 展示最近 Star 的 4 个项目
